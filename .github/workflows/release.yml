name: Release

on:
  workflow_run:
    workflows: ["Auto Tag"]
    types: [completed]
  # Manual re-run for a tag whose Auto Tag completion was missed.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0 # need tag history to confirm this commit is the tagged one

      # workflow_run fires on every Auto Tag completion, not just ones that
      # tag a new commit — only release when this commit is the tagged one.
      # workflow_dispatch is an explicit manual ask, so it skips that check.
      - name: Resolve tag and check it's new at this commit
        id: release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v.$VERSION"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            TAG_SHA=$(git rev-parse -q --verify "refs/tags/$TAG" || true)
            HEAD_SHA=$(git rev-parse HEAD)
            if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
              echo "No new tag $TAG at $HEAD_SHA — skipping release."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v7
        if: steps.release.outputs.should_release == 'true'
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
        if: steps.release.outputs.should_release == 'true'
      - run: npm run build
        if: steps.release.outputs.should_release == 'true'

      - name: Publish to npm
        if: steps.release.outputs.should_release == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog section
        if: steps.release.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          awk "/^## .*\[$VERSION\]/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md > release-notes.md

      - name: Create GitHub Release
        if: steps.release.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          body_path: release-notes.md
